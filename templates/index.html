<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback</title>
    <meta name="description" content="Submit your student feedback">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Student Feedback</h1>
            <p class="subtitle">We value your thoughts. Please take a moment to drop us some feedback.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flash-messages">
                  {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('submit') }}" method="POST" id="feedback-form">
                <div class="input-group">
                    <label for="student_name">Student Name <span class="required">*</span></label>
                    <input type="text" id="student_name" name="student_name" required placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label for="email">Email ID <span class="required">*</span></label>
                    <!-- Type=email handles basic HTML email format validation -->
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="input-group">
                    <label for="rating">Overall Rating <span class="required">*</span></label>
                    <div class="rating-container">
                        <select id="rating" name="rating" required>
                            <option value="" disabled selected>Select Rating</option>
                            <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                            <option value="4">⭐⭐⭐⭐ - Good</option>
                            <option value="3">⭐⭐⭐ - Average</option>
                            <option value="2">⭐⭐ - Poor</option>
                            <option value="1">⭐ - Terrible</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="experience">Overall Experience</label>
                    <textarea id="experience" name="experience" rows="4" placeholder="Tell us about your experience..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span>Submit Feedback</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
